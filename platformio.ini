[platformio]
default_envs = teni_esp32s3
src_dir = firmware/src
include_dir = firmware/include
test_dir = test

[env]
extra_scripts =
  pre:scripts/build_assets.py
  post:scripts/flash_report.py
build_flags =
  -std=gnu++17
  -DTENI_LOG_LEVEL=3
  -Wall
  -Wextra
  -Wpedantic
build_unflags = -std=gnu++11

[env:teni_esp32s3]
platform = espressif32@6.10.0
board = teni_esp32s3
framework = arduino
board_build.flash_size = 16MB
board_build.partitions = partitions.csv
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_upload.flash_size = 16MB
monitor_speed = 115200
lib_deps =
  earlephilhower/ESP8266Audio@2.0.0
  adafruit/Adafruit NeoPixel@^1.12.5
build_src_filter = +<*> -<hal/HostHal.cpp>

[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_flags =
  ${env.build_flags}
  -DTENI_HOST_TEST
build_src_filter =
  +<core/EventBus.cpp>
  +<core/DeviceStateMachine.cpp>
  +<drivers/ButtonEngine.cpp>
  +<modules/story/StoryPlayer.cpp>
  +<modules/music/MusicPlayer.cpp>
  +<services/MediaLibrary.cpp>
  +<services/AssetManager.cpp>
  +<services/AIEngineFactory.cpp>
  +<services/AIInteractionService.cpp>
  +<services/IntentMatcher.cpp>
  +<services/SimpleAIEngine.cpp>
  +<services/PlaybackCoordinator.cpp>
  +<generated/assets.cpp>
