name: firmware

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PlatformIO
        run: pip install 'platformio==6.1.18'
      - name: Native tests
        run: pio test -e native
      - name: ESP32-S3 build
        run: pio run -e teni_esp32s3
      - name: Formatting
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format
          scripts/format.sh
          git diff --exit-code
